<script>
emailjs.init("jUywjsnvRbSRd7elT");

const WA = "6281261728338";
const LI = "https://www.linkedin.com/in/budipranoto/";
const C = {ink:"#1a1a2e",yellow:"#F5C518",yellowLight:"#FFFBE6",cream:"#F8F4EC",white:"#fff",muted:"#6b6b6b",soft:"#bbb",border:"#E8E4DA",red:"#e63946",green:"#25D366"};

const LOAD_MSGS = ["Lagi baca kondisi brand kamu...","Cek kompetitor di wilayahmu...","Ngolah tantangan yang kamu hadapi...","Susun apa yang paling penting dulu...","Nulis rencana 30 hari...","Hampir jadi..."];

const INIT = {
  namaBisnis:"",industri:"",wilayah:"",wilayahDetail:"",lamaBisnis:"",ukuranTim:"",
  caraPelanggan:[],website:"",instagram:"",tiktok:"",marketplace:"",wa:"",
  kompetitor:["","","","",""],
  s1:"",s2:"",s2d:"",s3:"",s4:"",
  t1:"",t2:"",t3:"",t4:"",
  g1:"",g2:"",g3:"",g4:"",userEmail:"",
};

let state = {step:"sales",form:JSON.parse(JSON.stringify(INIT)),result:null,err:"",loadIdx:0,retryCount:0,errType:null,hasSaved:false,pdfLoading:false};

// ── Helpers ──────────────────────────────────────────────────
function sf(k,v){ state.form[k]=v; try{localStorage.setItem("bgp30_form",JSON.stringify(state.form));}catch(e){} }
function tog(k,v){ const a=state.form[k]; state.form[k]=a.includes(v)?a.filter(x=>x!==v):[...a,v]; try{localStorage.setItem("bgp30_form",JSON.stringify(state.form));}catch(e){} render(); }

function go(step){
  state.step=step; state.err="";
  if(step!=="loading"&&step!=="error") try{localStorage.setItem("bgp30_step",step);}catch(e){}
  render(); window.scrollTo(0,0);
}

function scoreInput(text,min=80){
  if(!text) return {score:0,label:"",color:""};
  const l=text.trim().length;
  if(l<30) return {score:10,label:"Terlalu singkat",color:"#e63946"};
  if(l<min) return {score:40,label:"Perlu lebih detail",color:"#ffb300"};
  if(l<min*2) return {score:75,label:"Cukup baik",color:"#ffb300"};
  return {score:100,label:"Detail ✓",color:"#4caf50"};
}

function buildUserPrompt(f){
  const komp=f.kompetitor.filter(k=>k.trim());
  const loc=f.wilayahDetail||f.wilayah||"Indonesia";
  return [
    "Bisnis: "+f.namaBisnis+" | Industri: "+f.industri+" | Wilayah: "+loc,
    "Lama: "+f.lamaBisnis+" | Tim: "+f.ukuranTim,
    "Platform: IG="+(f.instagram||"-")+" Web="+(f.website||"-")+" TikTok="+(f.tiktok||"-")+" Marketplace="+(f.marketplace||"-"),
    komp.length>0?"Kompetitor: "+komp.join(", "):"Riset 2-3 kompetitor utama untuk "+f.industri+" di "+loc,
    "Kondisi brand: "+f.s1,
    "Konsistensi: "+f.s2+(f.s2d?" - "+f.s2d:""),
    "Feedback: "+(f.s3||"-"),
    "Pelanggan terbaik: "+(f.s4||"-"),
    "Sudah dicoba: "+f.t1,
    "Belum beres: "+f.t2,
    "Kalah kompetitor: "+(f.t3||"-"),
    "Mengganjal: "+(f.t4||"-"),
    "Tujuan 30 hari: "+f.g1,
    "Prioritas: "+f.g2+" | Waktu: "+f.g3+" | Kendala: "+(f.g4||"-"),
  ].join("\n");
}

function parseResult(txt){
  // 1. Try direct parse first (server already cleans output — fastest path)
  try{ return JSON.parse(txt.trim()); }catch(_){}
  // 2. Strip markdown fences
  let t=txt.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
  try{ return JSON.parse(t); }catch(_){}
  // 3. Brace-match from end: handles preamble text before JSON
  //    Only reached if steps 1-2 failed, so { in string values are not an issue
  const lastClose=t.lastIndexOf("}");
  if(lastClose>-1){
    let depth=0,st=-1;
    for(let i=lastClose;i>=0;i--){
      if(t[i]==="}") depth++;
      else if(t[i]==="{"){depth--;if(depth===0){st=i;break;}}
    }
    if(st>-1) t=t.slice(st,lastClose+1);
  }
  try{ return JSON.parse(t); }catch(_){}
  // 4. Last resort: flatten all whitespace
  t=t.replace(/\r?\n/g," ").replace(/\s+/g," ");
  return JSON.parse(t);
}

// ── AI Call ───────────────────────────────────────────────────
async function runAI(isRetry){
  state.step="loading"; state.loadIdx=0;
  if(isRetry) state.retryCount++; else state.retryCount=0;
  state.errType=null; state.err="";
  render();
  let i=0;
  const iv=setInterval(()=>{ i++; if(i<LOAD_MSGS.length){state.loadIdx=i;const el=document.getElementById("load-msg");if(el)el.textContent=LOAD_MSGS[i];} },1800);
  try{
    const ctrl=new AbortController();
    const to=setTimeout(()=>ctrl.abort(),45000);
    let res;
    try{
      res=await fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},signal:ctrl.signal,body:JSON.stringify({messages:[{role:"user",content:buildUserPrompt(state.form)}]})});
      clearTimeout(to);
    }catch(fe){clearTimeout(to);throw{type:"network",msg:fe.name==="AbortError"?"Koneksi timeout. Coba lagi.":"Periksa koneksi internet kamu."};}
    if(!res.ok) throw{type:"api",msg:"Server sibuk ("+res.status+"). Coba lagi."};
    let data; try{data=await res.json();}catch(e){throw{type:"parse",msg:"Respons tidak terbaca."};}
    const txtBlock=(data.content||[]).find(b=>b.type==="text");
    if(!txtBlock||!txtBlock.text) throw{type:"parse",msg:"Hasil kosong. Coba lagi."};
    let parsed;
    try{ parsed=parseResult(txtBlock.text); }
    catch(e){ throw{type:"parse",msg:"Format tidak valid. Coba lagi."}; }
    // Handle structured error from server-side validation
    if(parsed.__error){
      if(parsed.reason==="invalid_json") throw{type:"parse",msg:"Hasilnya terpotong — coba lagi."};
      if(parsed.reason==="missing_fields") throw{type:"parse",msg:"Hasil tidak lengkap. Coba lagi."};
      throw{type:"parse",msg:"Format tidak valid. Coba lagi."};
    }
    if(!parsed.diagnosis_p1) throw{type:"parse",msg:"Hasil tidak lengkap. Coba lagi."};
    clearInterval(iv);
    state.result=parsed;
    try{localStorage.removeItem("bgp30_form");localStorage.removeItem("bgp30_step");}catch(e){}

    // EmailJS
    try{
      const f=state.form, r=parsed;
      const loc=f.wilayahDetail||f.wilayah||"Indonesia";
      const date=new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
      const rencana=["minggu1","minggu2","minggu3","minggu4"].map((m,i)=>{
        if(!r[m]) return "";
        return "MINGGU "+(i+1)+": "+r[m].tema+"\n"+(r[m].actions||[]).map((a,j)=>"  "+(j+1)+". "+a).join("\n");
      }).filter(Boolean).join("\n\n");
      const komp=(r.kompetitor_analisis||[]).map((k,i)=>"Kompetitor "+(i+1)+": "+(k.nama||k.url)+"\n  Kelebihan: "+k.kelebihan+"\n  Kelemahan: "+k.kelemahan+"\n  Peluang: "+k.peluang).join("\n\n");
      await emailjs.send("bgp30","template_bgp30",{
        user_email:f.userEmail,nama_bisnis:f.namaBisnis,industri:f.industri,
        wilayah:loc,tanggal:date,opening_line:r.opening_line||"",
        diagnosis_p1:r.diagnosis_p1||"",diagnosis_p2:r.diagnosis_p2||"",
        prioritas:(r.prioritas||[]).map((p,i)=>(i+1)+". "+p).join("\n"),
        rencana_30_hari:rencana,kompetitor:komp||"Tidak ada data.",
        pesan_personal:r.pesan_personal||"",
      });
    }catch(e){console.log("EmailJS:",e);}

    // Formspree
    try{
      const f=state.form, r=parsed;
      const fd=new FormData();
      fd.append("01_nama_bisnis",f.namaBisnis);fd.append("02_industri",f.industri);
      fd.append("03_wilayah",f.wilayahDetail||f.wilayah||"Indonesia");
      fd.append("04_email",f.userEmail);fd.append("05_lama_bisnis",f.lamaBisnis);
      fd.append("06_ukuran_tim",f.ukuranTim);fd.append("07_cara_pelanggan",f.caraPelanggan.join(", ")||"-");
      fd.append("08_kondisi_brand",f.s1);fd.append("09_konsistensi",f.s2);
      fd.append("10_feedback",f.s3||"-");fd.append("11_pelanggan_terbaik",f.s4||"-");
      fd.append("12_sudah_dicoba",f.t1);fd.append("13_belum_beres",f.t2);
      fd.append("14_tujuan",f.g1);fd.append("15_prioritas",f.g2);
      fd.append("16_diagnosis",r.diagnosis_p1+" "+r.diagnosis_p2);
      fd.append("17_submitted_at",new Date().toLocaleString("id-ID"));
      await fetch("https://formspree.io/f/mlgzqqze",{method:"POST",body:fd});
    }catch(e){}

    setTimeout(()=>{ state.step="result"; render(); },600);
  }catch(e){
    clearInterval(iv);
    state.err=e.msg||"Terjadi kesalahan.";
    state.errType=e.type||"network";
    state.step="error"; render();
  }
}

// ── PDF ───────────────────────────────────────────────────────
function doPDF(){
  if(!state.result){ state.pdfLoading=false; return; }
  try{
  const r=state.result, f=state.form;
  const date=new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
  const loc=f.wilayahDetail||f.wilayah||"Indonesia";
  const wColors=["#F5C518","#1a1a2e","#2D6A4F","#C84B31"];

  const weekHTML=["minggu1","minggu2","minggu3","minggu4"].map((m,i)=>{
    if(!r[m]) return "";
    const acts=(r[m].actions||[]).map((a,j)=>`<tr><td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;width:36px;vertical-align:top;"><div style="width:22px;height:22px;background:${wColors[i]};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:${i===0?"#1a1a2e":"#fff"};">${j+1}</div></td><td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px;line-height:1.6;color:#1a1a2e;">${a}</td></tr>`).join("");
    return `<div style="margin-bottom:20px;border-radius:12px;overflow:hidden;border:1.5px solid #e0e0e0;page-break-inside:avoid;"><div style="background:${wColors[i]};padding:14px 18px;display:flex;align-items:center;gap:12px;"><div style="width:30px;height:30px;background:${i===0?"#1a1a2e":"rgba(255,255,255,0.2)"};border-radius:50%;display:flex;align-items:center;justify-content:center;color:${i===0?"#F5C518":"#fff"};font-size:14px;font-weight:800;flex-shrink:0;">${i+1}</div><div><p style="font-size:9px;font-weight:800;letter-spacing:0.12em;opacity:0.7;margin-bottom:2px;color:${i===0?"#1a1a2e":"#fff"};">MINGGU ${i+1}</p><p style="font-size:15px;font-weight:800;color:${i===0?"#1a1a2e":"#fff"};">${r[m].icon||""} ${r[m].tema}</p></div>${r[m].focus?`<div style="margin-left:auto;background:${i===0?"rgba(0,0,0,0.1)":"rgba(255,255,255,0.15)"};border-radius:8px;padding:6px 12px;"><p style="font-size:11px;color:${i===0?"#1a1a2e":"#fff"};font-style:italic;">${r[m].focus}</p></div>`:""}</div><table style="width:100%;border-collapse:collapse;background:#fff;">${acts}</table></div>`;
  }).join("");

  const kompHTML=(r.kompetitor_analisis||[]).length>0?`<div style="page-break-before:always;padding-top:32px;"><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;"><div style="width:4px;height:32px;background:#F5C518;border-radius:2px;"></div><h2 style="font-size:18px;font-weight:800;color:#1a1a2e;margin:0;">Analisis Kompetitor</h2>${r.kompetitor_riset_mandiri?'<span style="background:#FFFBE6;border:1px solid #F5C518;color:#1a1a2e;font-size:9px;font-weight:800;padding:3px 10px;border-radius:99px;">RISET AI</span>':""}</div>${(r.kompetitor_analisis||[]).map((k,i)=>`<div style="margin-bottom:20px;border-radius:12px;overflow:hidden;border:1.5px solid #e0e0e0;page-break-inside:avoid;"><div style="background:#1a1a2e;padding:14px 20px;display:flex;align-items:center;gap:12px;"><div style="width:30px;height:30px;background:#F5C518;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#1a1a2e;flex-shrink:0;">${i+1}</div><div><p style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;margin-bottom:2px;">KOMPETITOR ${i+1}</p><p style="font-size:15px;font-weight:800;color:#fff;">${k.nama||k.url}</p>${k.nama&&k.url?`<p style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;">${k.url}</p>`:""}</div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;background:#fff;"><div style="padding:16px;border-right:1px solid #f0f0f0;"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;"><div style="width:8px;height:8px;border-radius:50%;background:#4CAF50;"></div><p style="font-size:9px;font-weight:800;color:#bbb;letter-spacing:0.1em;">KELEBIHAN</p></div><p style="font-size:12px;line-height:1.6;">${k.kelebihan}</p></div><div style="padding:16px;border-right:1px solid #f0f0f0;"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;"><div style="width:8px;height:8px;border-radius:50%;background:#F44336;"></div><p style="font-size:9px;font-weight:800;color:#bbb;letter-spacing:0.1em;">KELEMAHAN</p></div><p style="font-size:12px;line-height:1.6;">${k.kelemahan}</p></div><div style="padding:16px;background:#FFFBE6;"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;"><div style="width:8px;height:8px;border-radius:50%;background:#F5C518;"></div><p style="font-size:9px;font-weight:800;color:#bbb;letter-spacing:0.1em;">PELUANG</p></div><p style="font-size:12px;line-height:1.6;font-weight:600;">${k.peluang}</p></div></div></div>`).join("")}</div>`:"";

// ── DOM Builders ──────────────────────────────────────────────
function el(tag,attrs,...kids){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="cls") e.className=v;
    else if(k==="css") e.style.cssText=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  });
  kids.flat().forEach(k=>{ if(k==null||k===false) return; e.appendChild(typeof k==="string"?document.createTextNode(k):k); });
  return e;
}

function inp(key,attrs){
  const e=document.createElement("input");
  e.className="inp";
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{ if(k==="css") e.style.cssText=v; else e.setAttribute(k,v); });
  e.value=state.form[key]||"";
  e.addEventListener("input",ev=>sf(key,ev.target.value));
  return e;
}

function ta(key,placeholder,minH){
  const e=document.createElement("textarea");
  e.className="ta"; e.placeholder=placeholder;
  if(minH) e.style.minHeight=(typeof minH==="number"?minH+"px":minH);
  e.value=state.form[key]||"";
  e.addEventListener("input",ev=>sf(key,ev.target.value));
  return e;
}

function qta(key,placeholder,minChars){
  const val=state.form[key]||"";
  const q=scoreInput(val,minChars||80);
  const wrap=document.createElement("div");
  const t=ta(key,placeholder);
  // Real-time quality bar update without full re-render
  t.addEventListener("input",ev=>{
    const nq=scoreInput(ev.target.value,minChars||80);
    const barWrap=wrap.querySelector(".qta-bar");
    const fill=wrap.querySelector(".qta-fill");
    const lbl=wrap.querySelector(".qta-lbl");
    if(ev.target.value.length>0){
      if(barWrap) barWrap.style.display="flex";
      if(fill){ fill.style.width=nq.score+"%"; fill.style.background=nq.color; }
      if(lbl){ lbl.textContent=nq.label; lbl.style.color=nq.color; }
    } else {
      if(barWrap) barWrap.style.display="none";
    }
  });
  wrap.appendChild(t);
  const bar=el("div",{cls:"qta-bar",css:"display:"+(val.length>0?"flex":"none")+";align-items:center;justify-content:space-between;margin-top:4px;"},
    el("div",{css:"flex:1;height:3px;background:#E8E4DA;border-radius:99px;margin-right:8px;overflow:hidden;"},
      el("div",{cls:"qta-fill",css:"height:100%;width:"+q.score+"%;background:"+q.color+";border-radius:99px;transition:width 0.25s,background 0.25s;"})
    ),
    el("span",{cls:"qta-lbl",css:"font-size:11px;color:"+q.color+";font-weight:600;white-space:nowrap;"},q.label)
  );
  wrap.appendChild(bar);
  return wrap;
}

function opt(label,sel,onClick,multi){
  const d=el("div",{cls:"opt"+(sel?" sel":""),onclick:onClick},
    el("div",{cls:multi?"chk":"dot"},multi&&sel?"✓":(!multi&&sel)?el("div",{css:"width:7px;height:7px;border-radius:50%;background:white;"}):""),
    el("p",{cls:"opt-lbl"},label)
  );
  return d;
}
