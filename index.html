<style>

body{font-family:'Inter',sans-serif;color:#1a1a2e;-webkit-font-smoothing:antialiased;}

.opt.sel{border-color:#1a1a2e;background:#FFFBE6;}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid #E8E4DA;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.opt.sel .dot{border-color:#1a1a2e;background:#1a1a2e;}
.chk{width:18px;height:18px;border-radius:4px;border:2px solid #E8E4DA;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all 0.12s;}
.opt.sel .chk{border-color:#1a1a2e;background:#1a1a2e;}

.tag{display:inline-flex;align-items:center;gap:5px;background:#F5C518;color:#1a1a2e;font-size:10px;font-weight:800;padding:4px 12px;border-radius:99px;letter-spacing:0.08em;text-transform:uppercase;border:1.5px solid #1a1a2e;}

.err{color:#e63946;font-size:12px;font-weight:600;margin-top:6px;}
.week-card{border:2px solid #1a1a2e;border-radius:12px;overflow:hidden;margin-bottom:10px;}
.week-head{padding:12px 14px;background:#F5C518;border-bottom:2px solid #1a1a2e;display:flex;align-items:center;gap:10px;}
.week-num{width:26px;height:26px;background:#1a1a2e;color:#F5C518;border-radius:50%;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

<body>
<div id="app"></div>
<script>
const WA = "6281261728338";
const LI = "https://www.linkedin.com/in/budipranoto/";
const C = {ink:"#1a1a2e",yellow:"#F5C518",yellowLight:"#FFFBE6",cream:"#F8F4EC",white:"#fff",muted:"#6b6b6b",soft:"#bbb",border:"#E8E4DA",red:"#e63946",green:"#25D366"};

const LOAD_MSGS = [
  "Membaca kondisi brand kamu...",
  "Riset kompetitor di wilayah kamu...",
  "Menganalisis tantangan...",
  "Menyusun prioritas...",
  "Merancang rencana 30 hari...",
  "Hampir selesai...",
];

const INIT = {
  namaBisnis:"",industri:"",wilayah:"",wilayahDetail:"",lamaBisnis:"",ukuranTim:"",
  caraPelanggan:[],website:"",instagram:"",tiktok:"",marketplace:"",wa:"",
  userEmail:"",
  kompetitor:["","","","",""],
  s1:"",s2:"",s2d:"",s3:"",s4:"",
  t1:"",t2:"",t3:"",t4:"",
  g1:"",g2:"",g3:"",g4:"",
};

// State
let state = {
  step: "sales",
  form: {...INIT},
  result: null,
  err: "",
  loadIdx: 0,
  retryCount: 0,
  errType: null,
  hasSaved: false,
  pdfLoading: false,
};

function buildUserPrompt(f) {
  const komp = f.kompetitor.filter(k=>k.trim());
  const loc = f.wilayahDetail||f.wilayah||"Indonesia";
  return [
    "Bisnis: " + f.namaBisnis + " | Industri: " + f.industri + " | Wilayah: " + loc,
    "Lama: " + f.lamaBisnis + " | Tim: " + f.ukuranTim,
    "Platform: IG=" + (f.instagram||"-") + " Web=" + (f.website||"-") + " TikTok=" + (f.tiktok||"-") + " Marketplace=" + (f.marketplace||"-"),
    komp.length > 0 ? "Kompetitor: " + komp.join(", ") : "Riset 2-3 kompetitor utama untuk " + f.industri + " di " + loc,
    "Kondisi brand: " + f.s1,
    "Konsistensi: " + f.s2 + (f.s2d ? " - " + f.s2d : ""),
    "Feedback: " + (f.s3||"-"),
    "Pelanggan terbaik: " + (f.s4||"-"),
    "Sudah dicoba: " + f.t1,
    "Belum beres: " + f.t2,
    "Kalah kompetitor: " + (f.t3||"-"),
    "Mengganjal: " + (f.t4||"-"),
    "Tujuan 30 hari: " + f.g1,
    "Prioritas: " + f.g2 + " | Waktu: " + f.g3 + " | Kendala: " + (f.g4||"-"),
  ].join("\n");
}

function parseResult(txt) {
  let text = txt;
  // Remove backticks
  text = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  // Extract JSON
  const first = text.indexOf("{");
  const last = text.lastIndexOf("}");
  if(first !== -1 && last !== -1) text = text.slice(first, last+1);
  // Remove newlines
  text = text.replace(/\r?\n/g," ").replace(/\s+/g," ").trim();
  return JSON.parse(text);
}

async function runAI(isRetry) {
  state.step = "loading";
  state.loadIdx = 0;
  if(isRetry) state.retryCount++;
  else state.retryCount = 0;
  state.errType = null;
  state.err = "";
  render();

  let i = 0;
  const iv = setInterval(()=>{ i++; if(i<LOAD_MSGS.length){state.loadIdx=i;updateLoadMsg();} }, 1800);

  try {
    const userContent = buildUserPrompt(state.form);
    const ctrl = new AbortController();
    const to = setTimeout(()=>ctrl.abort(), 45000);

    let res;
    try {
      res = await fetch("/.netlify/functions/claude", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        signal: ctrl.signal,
        body: JSON.stringify({messages:[{role:"user",content:userContent}]})
      });
      clearTimeout(to);
    } catch(fe) {
      clearTimeout(to);
      throw {type:"network", msg: fe.name==="AbortError" ? "Koneksi timeout. Coba lagi." : "Periksa koneksi internet kamu."};
    }

    if(!res.ok) throw {type:"api", msg:"Server sibuk ("+res.status+"). Coba lagi."};

    let data;
    try { data = await res.json(); }
    catch(e) { throw {type:"parse", msg:"Respons tidak terbaca."}; }

    const txtBlock = (data.content||[]).find(b=>b.type==="text");
    if(!txtBlock||!txtBlock.text) throw {type:"parse", msg:"Hasil kosong. Coba lagi."};

    let parsed;
    try {
      parsed = parseResult(txtBlock.text);
    } catch(e) {
      throw {type:"parse", msg:"Format tidak valid. Coba lagi."};
    }

    if(!parsed.diagnosis_p1) throw {type:"parse", msg:"Hasil tidak lengkap. Coba lagi."};

    clearInterval(iv);
    state.result = parsed;
    clearSaved();

    // Send via EmailJS
    try {
      const f = state.form;
      const r = parsed;
      const loc = f.wilayahDetail||f.wilayah||"Indonesia";
      const date = new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});

      // Format rencana 30 hari
      const rencana = ["minggu1","minggu2","minggu3","minggu4"].map((m,i)=>{
        if(!r[m]) return "";
        const acts = (r[m].actions||[]).map((a,j)=>`  ${j+1}. ${a}`).join("\n");
        return `MINGGU ${i+1}: ${r[m].tema}\n${acts}`;
      }).filter(Boolean).join("\n\n");

      // Format kompetitor
      const komp = (r.kompetitor_analisis||[]).map((k,i)=>{
        return `Kompetitor ${i+1}: ${k.nama||k.url}\n  Kelebihan: ${k.kelebihan}\n  Kelemahan: ${k.kelemahan}\n  Peluang: ${k.peluang}`;
      }).join("\n\n");

      await emailjs.send("bgp30", "template_bgp30", {
        user_email: f.userEmail,
        nama_bisnis: f.namaBisnis,
        industri: f.industri,
        wilayah: loc,
        tanggal: date,
        opening_line: r.opening_line||"",
        diagnosis_p1: r.diagnosis_p1||"",
        diagnosis_p2: r.diagnosis_p2||"",
        prioritas: (r.prioritas||[]).map((p,i)=>`${i+1}. ${p}`).join("\n"),
        rencana_30_hari: rencana,
        kompetitor: komp||"Tidak ada data kompetitor.",
        pesan_personal: r.pesan_personal||"",
      });
    } catch(e) { console.log("EmailJS error:", e); }

    // Submit to Formspree
    try {
      const fd = new FormData();
      const fm = state.form;
      fd.append("01_nama_bisnis", fm.namaBisnis);
      fd.append("02_industri", fm.industri);
      fd.append("03_wilayah", fm.wilayahDetail||fm.wilayah||"Indonesia");
      fd.append("04_lama_bisnis", fm.lamaBisnis);
      fd.append("05_ukuran_tim", fm.ukuranTim);
      fd.append("06_cara_pelanggan", fm.caraPelanggan.join(", ")||"-");
      fd.append("07_instagram", fm.instagram||"-");
      fd.append("08_website", fm.website||"-");
      fd.append("09_tiktok", fm.tiktok||"-");
      fd.append("10_marketplace", fm.marketplace||"-");
      fd.append("11_kompetitor", fm.kompetitor.filter(k=>k.trim()).join(", ")||"AI riset mandiri");
      fd.append("12_kondisi_brand", fm.s1);
      fd.append("13_konsistensi", fm.s2);
      fd.append("14_feedback", fm.s3||"-");
      fd.append("15_pelanggan_terbaik", fm.s4||"-");
      fd.append("16_sudah_dicoba", fm.t1);
      fd.append("17_belum_beres", fm.t2);
      fd.append("18_kalah_kompetitor", fm.t3||"-");
      fd.append("19_mengganjal", fm.t4||"-");
      fd.append("20_tujuan_30_hari", fm.g1);
      fd.append("21_prioritas", fm.g2);
      fd.append("22_waktu", fm.g3);
      fd.append("23_kendala", fm.g4||"-");
      fd.append("24_diagnosis_p1", parsed.diagnosis_p1||"");
      fd.append("25_diagnosis_p2", parsed.diagnosis_p2||"");
      fd.append("26_prioritas_ai", (parsed.prioritas||[]).join(" | "));
      fd.append("27_pesan_personal", parsed.pesan_personal||"");
      fd.append("28_submitted_at", new Date().toLocaleString("id-ID"));
      await fetch("https://formspree.io/f/mlgzqqze", {method:"POST",body:fd});
    } catch(e) {}

    setTimeout(()=>{ state.step="result"; render(); }, 600);

  } catch(e) {
    clearInterval(iv);
    state.err = e.msg||"Terjadi kesalahan.";
    state.errType = e.type||"network";
    state.step = "error";
    render();
  }
}

function clearSaved() {
  try{localStorage.removeItem("bgp30_form");localStorage.removeItem("bgp30_step");}catch(e){}
}

function saveForm() {
  try{localStorage.setItem("bgp30_form",JSON.stringify(state.form));}catch(e){}
}

function saveStep() {
  if(state.step!=="loading"&&state.step!=="error"){
    try{localStorage.setItem("bgp30_step",state.step);}catch(e){}
  }
}

function sf(k,v){ state.form[k]=v; saveForm(); render(); }
function tog(k,v){ const a=state.form[k]; state.form[k]=a.includes(v)?a.filter(x=>x!==v):[...a,v]; saveForm(); render(); }
function go(step){ state.step=step; state.err=""; saveStep(); render(); window.scrollTo(0,0); }

function doPDF() {
  if(!state.result) return;
  const r = state.result;
  const f = state.form;
  const date = new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
  const loc = f.wilayahDetail||f.wilayah||"Indonesia";

  const weekHTML = ["minggu1","minggu2","minggu3","minggu4"].map((m,i)=>{
    if(!r[m]) return "";
    const acts = (r[m].actions||[]).map(a=>`<div style="display:flex;gap:8px;margin-bottom:6px;"><span style="color:#F5C518;font-weight:800;">→</span><p style="font-size:13px;line-height:1.5;margin:0;">${a}</p></div>`).join("");
    return `<div style="margin-bottom:16px;border:2px solid #1a1a2e;border-radius:10px;overflow:hidden;"><div style="background:#F5C518;padding:11px 16px;border-bottom:2px solid #1a1a2e;display:flex;align-items:center;gap:10px;"><div style="width:24px;height:24px;background:#1a1a2e;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#F5C518;font-size:12px;font-weight:800;">${i+1}</div><div><p style="font-size:9px;font-weight:800;letter-spacing:0.1em;margin-bottom:1px;">MINGGU ${i+1}</p><p style="font-size:14px;font-weight:800;">${r[m].icon||""} ${r[m].tema}</p></div></div><div style="padding:12px 16px;background:#fff;">${acts}</div></div>`;
  }).join("");

  const kompHTML = (r.kompetitor_analisis||[]).map((k,i)=>`<div style="margin-bottom:12px;border:2px solid #1a1a2e;border-radius:10px;overflow:hidden;"><div style="background:#1a1a2e;padding:10px 14px;"><p style="font-size:9px;font-weight:800;color:rgba(255,255,255,0.4);letter-spacing:0.1em;margin-bottom:2px;">KOMPETITOR ${i+1}</p><p style="font-size:14px;font-weight:800;color:#fff;">${k.nama||k.url}</p></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;background:#fff;"><div style="padding:10px 12px;border-right:1px solid #E8E4DA;"><p style="font-size:9px;font-weight:800;color:#bbb;margin-bottom:4px;">KELEBIHAN</p><p style="font-size:12px;">${k.kelebihan}</p></div><div style="padding:10px 12px;border-right:1px solid #E8E4DA;"><p style="font-size:9px;font-weight:800;color:#bbb;margin-bottom:4px;">KELEMAHAN</p><p style="font-size:12px;">${k.kelemahan}</p></div><div style="padding:10px 12px;"><p style="font-size:9px;font-weight:800;color:#F5C518;margin-bottom:4px;">PELUANG</p><p style="font-size:12px;font-weight:600;">${k.peluang}</p></div></div></div>`).join("");

  const html = `<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"/><title>Brand Growth Plan 30 — ${f.namaBisnis}</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;color:#1a1a2e;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}@page{margin:0;size:A4;}.page{width:210mm;min-height:297mm;margin:0 auto;background:#fff;}</style></head><body><div class="page"><div style="background:#1a1a2e;color:#fff;padding:44px 44px 36px;position:relative;overflow:hidden;"><div style="position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;background:#F5C518;opacity:0.08;"></div><div style="display:inline-block;background:#F5C518;color:#1a1a2e;font-size:9px;font-weight:800;padding:4px 12px;border-radius:99px;letter-spacing:0.1em;margin-bottom:24px;">BRAND GROWTH PLAN 30</div><h1 style="font-size:32px;font-weight:800;line-height:1.15;margin-bottom:6px;">${f.namaBisnis}</h1><p style="font-size:14px;opacity:0.5;margin-bottom:36px;">${f.industri} · ${loc}</p><div style="display:flex;gap:28px;border-top:1px solid rgba(255,255,255,0.12);padding-top:20px;"><div><p style="font-size:9px;opacity:0.4;letter-spacing:0.08em;margin-bottom:3px;">DIBUAT OLEH</p><p style="font-size:13px;font-weight:600;">Budi Pranoto</p></div><div><p style="font-size:9px;opacity:0.4;letter-spacing:0.08em;margin-bottom:3px;">TANGGAL</p><p style="font-size:13px;font-weight:600;">${date}</p></div><div><p style="font-size:9px;opacity:0.4;letter-spacing:0.08em;margin-bottom:3px;">DURASI</p><p style="font-size:13px;font-weight:600;">30 Hari</p></div></div></div><div style="padding:32px 44px;border-bottom:2px solid #E8E4DA;">${r.opening_line?`<p style="font-family:'Georgia',serif;font-style:italic;font-size:16px;line-height:1.75;padding-left:16px;border-left:4px solid #F5C518;margin-bottom:18px;">${r.opening_line}</p>`:""}<p style="font-size:13px;line-height:1.8;margin-bottom:10px;">${r.diagnosis_p1||""}</p><p style="font-size:13px;line-height:1.8;">${r.diagnosis_p2||""}</p></div><div style="padding:22px 44px;background:#F5C518;border-bottom:2px solid #1a1a2e;"><p style="font-size:9px;font-weight:800;letter-spacing:0.12em;margin-bottom:12px;">PRIORITAS 48 JAM PERTAMA</p>${(r.prioritas||[]).map(p=>`<div style="display:flex;gap:10px;margin-bottom:8px;"><span style="font-size:15px;">⚡</span><p style="font-size:13px;font-weight:500;line-height:1.5;margin:0;">${p}</p></div>`).join("")}</div>${kompHTML?`<div style="padding:32px 44px;border-bottom:2px solid #E8E4DA;"><p style="font-size:9px;font-weight:800;letter-spacing:0.12em;color:#bbb;margin-bottom:16px;">ANALISIS KOMPETITOR</p>${kompHTML}</div>`:""}<div style="padding:32px 44px;border-bottom:2px solid #E8E4DA;"><p style="font-size:9px;font-weight:800;letter-spacing:0.12em;color:#bbb;margin-bottom:20px;">RENCANA 30 HARI</p>${weekHTML}</div><div style="padding:26px 44px;background:#F8F4EC;"><p style="font-size:13px;line-height:1.8;font-style:italic;margin-bottom:18px;">${r.pesan_personal||""}</p><div style="display:flex;align-items:center;gap:12px;"><div style="width:38px;height:38px;background:#F5C518;border:2px solid #1a1a2e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;">B</div><div><p style="font-size:13px;font-weight:700;">Budi Pranoto</p><p style="font-size:11px;color:#6b6b6b;">Digital & Brand Strategist</p></div></div></div><div style="padding:13px 44px;border-top:1px solid #E8E4DA;display:flex;justify-content:space-between;"><p style="font-size:10px;color:#bbb;">Brand Growth Plan 30 · ${f.namaBisnis}</p><p style="font-size:10px;color:#bbb;">${date}</p></div></div></body></html>`;

  const blob = new Blob([html],{type:"text/html"});
  const url = URL.createObjectURL(blob);
  const win = window.open(url,"_blank");
  if(win) win.onload = ()=>setTimeout(()=>win.print(),800);
  setTimeout(()=>URL.revokeObjectURL(url),10000);
}

function updateLoadMsg() {
  const el = document.getElementById("load-msg");
  if(el) el.textContent = LOAD_MSGS[state.loadIdx];
}

function scoreInput(text, min=80) {
  if(!text) return {score:0,label:"",color:""};
  const len = text.trim().length;
  if(len<30) return {score:10,label:"Terlalu singkat",color:"#e63946"};
  if(len<min) return {score:40,label:"Perlu lebih detail",color:"#ffb300"};
  if(len<min*2) return {score:75,label:"Cukup baik",color:"#ffb300"};
  return {score:100,label:"Detail ✓",color:"#4caf50"};
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{ if(k==="class") el.className=v; else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v); else el.setAttribute(k,v); });
  children.flat().forEach(c=>{ if(c==null||c===false) return; el.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return el;
}

function Opt(label, sel, onSel, multi=false) {
  const d = h("div",{class:"opt"+(sel?" sel":""),onclick:onSel},
    h("div",{class:multi?"chk":"dot"}, multi&&sel?"✓": (!multi&&sel)?h("div",{style:"width:7px;height:7px;border-radius:50%;background:white;"}):""),
    h("p",{class:"opt-lbl"},label)
  );
  return d;
}

function QTA(value, onChange, placeholder, minChars=80) {
  const q = scoreInput(value, minChars);
  const wrap = h("div",null,
    h("textarea",{class:"ta",placeholder,oninput:onChange},value)
  );
  if(value && value.length > 0) {
    const bar = h("div",{style:"display:flex;align-items:center;justify-content:space-between;margin-top:4px;"},
      h("div",{style:"flex:1;height:3px;background:#E8E4DA;border-radius:99px;margin-right:8px;overflow:hidden;"},
        h("div",{style:`height:100%;width:${q.score}%;background:${q.color};border-radius:99px;transition:all 0.3s;`})
      ),
      h("span",{style:`font-size:11px;color:${q.color};font-weight:600;white-space:nowrap;`},q.label)
    );
    wrap.appendChild(bar);
  }
  return wrap;
}

function WkCard(n, data) {
  const card = h("div",{class:"week-card"},
    h("div",{class:"week-head"},
      h("div",{class:"week-num"},String(n)),
      h("div",null,
        h("p",{style:"font-size:10px;font-weight:700;color:#1a1a2e;opacity:0.55;letter-spacing:0.08em;"},"MINGGU "+n),
        h("p",{style:"font-size:14px;font-weight:800;color:#1a1a2e;"},(data.icon||"")+" "+data.tema)
      )
    )
  );
  if(data.focus) card.appendChild(h("div",{style:"padding:8px 14px;background:#fafaf8;border-bottom:1px solid #E8E4DA;"},h("p",{style:"font-size:12px;color:#6b6b6b;font-style:italic;"},data.focus)));
  (data.actions||[]).forEach(a=>{
    card.appendChild(h("div",{class:"week-item"},
      h("div",{class:"bullet"}),
      h("p",{style:"font-size:13px;line-height:1.5;color:#1a1a2e;"},a)
    ));
  });
  return card;
}

function ProgBar(pct, label, s, t) {
  return h("div",{class:"prog-wrap"},
    h("div",{class:"prog-row"},
      h("span",{style:"font-size:11px;font-weight:700;color:#6b6b6b;letter-spacing:0.06em;text-transform:uppercase;"},label),
      h("span",{style:"font-size:11px;font-weight:700;color:#bbb;"},s+"/"+t)
    ),
    h("div",{class:"prog-track"},h("div",{class:"prog-fill",style:`width:${pct}%;`}))
  );
}

        state.err && h("p",{class:"err"},state.err),
        h("div",{style:"height:90px;"})
      ),
      h("div",{class:"action-bar"},
        h("button",{class:"btn btn-primary",onclick:()=>{
          if(!f.g1||!f.g2||!f.g3){state.err="Lengkapi semua pertanyaan.";render();return;}
          if(f.g1.length<30){state.err="Jawaban tujuan masih terlalu singkat.";render();return;}
          if(!f.userEmail||!f.userEmail.includes("@")){state.err="Masukkan email yang valid.";render();return;}
          runAI(false);
        }},"Buat Brand Growth Plan 30 →"),
        h("button",{class:"btn btn-ghost",style:"margin-top:7px;",onclick:()=>go("tantangan")},"← Kembali")

}

function renderLoading() {
  return h("div",{style:"background:#F8F4EC;min-height:100vh;"},
    h("div",{class:"shell",style:"background:#fff;"},
      h("div",{style:"display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:0 24px;text-align:center;"},
        h("div",{style:"width:48px;height:48px;border:4px solid #F8F4EC;border-top:4px solid #F5C518;border-radius:50%;animation:spin 0.85s linear infinite;margin-bottom:24px;"}),
        h("span",{class:"tag",style:"margin-bottom:14px;"},"Sedang diproses"),
        h("p",{id:"load-msg",style:"font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:6px;"},LOAD_MSGS[state.loadIdx]),
        h("p",{style:"font-size:13px;color:#6b6b6b;"},"Untuk ",h("strong",null,state.form.namaBisnis),"...")

    )
  );
}

function renderError() {
  return h("div",{style:"background:#F8F4EC;min-height:100vh;"},
    h("div",{class:"shell",style:"background:#fff;"},
      h("div",{style:"display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:0 28px;text-align:center;"},
        h("div",{style:"width:52px;height:52px;background:#F5C518;border:2px solid #1a1a2e;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px;"},"⚠️"),
        h("span",{class:"tag",style:"margin-bottom:12px;"},"Ada Kendala"),
        h("h2",{class:"h2",style:"margin-bottom:8px;"},state.errType==="network"?"Koneksi Bermasalah":state.errType==="api"?"Server Sibuk":"Hasil Tidak Terbaca"),
        h("p",{style:"font-size:13px;color:#6b6b6b;line-height:1.6;margin-bottom:6px;"},state.err),
        h("p",{style:"font-size:12px;color:#bbb;margin-bottom:24px;"},state.retryCount<3?"Jawaban kamu tersimpan — tidak perlu isi ulang.":"Sudah 3x mencoba."),
        h("div",{style:"width:100%;display:flex;flex-direction:column;gap:8px;"},
          state.retryCount<3
            ? h("button",{class:"btn btn-yellow",style:"box-shadow:4px 4px 0 #1a1a2e;",onclick:()=>runAI(true)},"Coba Lagi "+(state.retryCount>0?"("+state.retryCount+"/3)":"")+"→")
            : h("a",{href:"https://wa.me/"+WA+"?text=Halo%2C%20saya%20mengalami%20kendala%20di%20Brand%20Growth%20Plan%2030.",target:"_blank",rel:"noreferrer",style:"display:flex;align-items:center;justify-content:center;gap:8px;background:#25D366;color:#fff;padding:14px;border-radius:14px;font-size:15px;font-weight:700;text-decoration:none;"},"Hubungi via WhatsApp"),
          h("button",{class:"btn btn-ghost",onclick:()=>go("tujuan")},"← Kembali ke Form")
        )
      )
    )
  );
}

  const r = state.result;

          ...(r.prioritas||[]).map((p,i)=>
            h("div",{style:"display:flex;gap:8px;align-items:flex-start;margin-bottom:"+(i<(r.prioritas.length-1)?"8":"0")+"px;"},
              h("span",{style:"font-weight:800;font-size:13px;flex-shrink:0;min-width:18px;"},String(i+1)+"."),

          ),
          ...r.kompetitor_analisis.map((k,i)=>
            h("div",{class:"komp-card",style:"margin-bottom:10px;"},

                h("p",{style:"font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:0.08em;margin-bottom:2px;"},"KOMPETITOR "+String(i+1)),
                h("p",{style:"font-size:14px;font-weight:800;color:#fff;"},k.nama||k.url),
                k.nama&&k.url&&h("p",{style:"font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px;"},k.url)

              h("div",{style:"display:grid;grid-template-columns:1fr 1fr 1fr;background:#fff;"},

                  h("div",{style:"padding:10px 11px;border-right:1px solid #E8E4DA;"},
                    h("p",{style:"font-size:9px;font-weight:800;color:#bbb;letter-spacing:0.08em;margin-bottom:4px;"},lbl.toUpperCase()),
                    h("p",{style:"font-size:12px;line-height:1.5;color:"+col+";font-weight:"+(lbl.includes("Peluang")?"600":"400")+";"},val)

                )
              )
            )
          )
        ),

        h("p",{class:"eyebrow",style:"margin-bottom:10px;"},"📅 Rencana 30 Hari"),
        ...["minggu1","minggu2","minggu3","minggu4"].map((m,i)=>r[m]?WkCard(i+1,r[m]):null).filter(Boolean),

        h("div",{style:"background:#F8F4EC;border:2px solid #E8E4DA;border-radius:12px;padding:14px 16px;margin-top:4px;margin-bottom:14px;"},
          h("p",{class:"eyebrow",style:"margin-bottom:8px;"},"💬 Pesan dari Saya"),
          h("p",{style:"font-size:13px;line-height:1.7;font-style:italic;margin-bottom:12px;"},r.pesan_personal),
          h("div",{style:"display:flex;align-items:center;gap:10px;"},
            h("div",{style:"width:32px;height:32px;background:#F5C518;border:2px solid #1a1a2e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;"},"B"),
            h("div",null,
              h("p",{style:"font-size:12px;font-weight:700;"},"Budi Pranoto"),
              h("p",{style:"font-size:11px;color:#6b6b6b;"},"Digital & Brand Strategist")
            )
          )
        ),

        h("a",{href:"https://wa.me/"+WA+"?text=Halo%2C%20saya%20baru%20selesai%20Brand%20Growth%20Plan%2030%20untuk%20"+encodeURIComponent(f.namaBisnis)+"%20dan%20ingin%20konsultasi.",target:"_blank",rel:"noreferrer",style:"display:flex;align-items:center;gap:12px;background:#1a1a2e;border-radius:12px;padding:14px 16px;margin-bottom:16px;text-decoration:none;box-shadow:4px 4px 0 #F5C518;"},

          ),

            h("p",{style:"font-size:13px;font-weight:700;color:#fff;margin-bottom:1px;"},"Butuh pendampingan lebih dalam?"),
            h("p",{style:"font-size:12px;color:rgba(255,255,255,0.5);"},"Klik untuk konsultasi dengan Budi")
          )
        ),

        CreditLine(),
        h("div",{style:"height:90px;"})
      ),
      h("div",{class:"action-bar"},
        h("button",{class:"btn btn-yellow",onclick:doPDF,disabled:state.pdfLoading},state.pdfLoading?"Membuka PDF...":"⬇ Download PDF")
      )
    )
  );
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  let el;
  switch(state.step) {
    case "sales": el = renderSales(); break;
    case "profil": el = renderProfil(); break;
    case "situasi": el = renderSituasi(); break;
    case "tantangan": el = renderTantangan(); break;
    case "tujuan": el = renderTujuan(); break;
    case "loading": el = renderLoading(); break;
    case "error": el = renderError(); break;
    case "result": el = renderResult(); break;
    default: el = renderSales();
  }
  app.appendChild(el);
}

// Init
try {
  const savedStep = localStorage.getItem("bgp30_step");
  if(savedStep && savedStep !== "sales" && savedStep !== "result") state.hasSaved = true;
} catch(e) {}

render();
</script>
