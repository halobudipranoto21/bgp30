const scoreInput = (text, min=80) => {
  if(!text) return {score:0,label:"",color:""};
  const len = text.trim().length;
  if(len < 30) return {score:10,label:"Terlalu singkat",color:"#e63946"};
  if(len < min) return {score:40,label:"Perlu lebih detail",color:"#ffb300"};
  if(len < min*2) return {score:75,label:"Cukup baik",color:"#ffb300"};
  return {score:100,label:"Detail ✓",color:"#4caf50"};
};

function buildPrompt(f) {
  const komp = f.kompetitor.filter(k=>k.trim());
  const loc = f.wilayahDetail||f.wilayah||"Indonesia";

    ? "Kompetitor dari user: " + komp.join(", ")

    ? "\nPERHATIAN: Beberapa jawaban user singkat. Jangan berasumsi — fokus pada yang jelas terlihat dari jawaban yang ada."

    system: `Kamu adalah Digital & Brand Strategist senior yang berbasis di Indonesia, berpengalaman di pasar UKM Indonesia. Gaya: jujur, ringkas, actionable. Gunakan "kamu". Gunakan "Saya" bukan nama.

- Platform dominan: Instagram & TikTok untuk discovery, WhatsApp untuk konversi, Tokopedia/Shopee untuk e-commerce
- Konsumen Indonesia: trust-driven, word-of-mouth kuat, visual-first, price-sensitive tapi mau bayar untuk value yang jelas

${qualityNote}

1. opening_line: 1 kalimat natural, sebut nama bisnis + industri + durasi
2. diagnosis_p1: kondisi brand SEKARANG — wajib parafrase jawaban spesifik user, bukan asumsi

5. prioritas: 3 tindakan paling berdampak dalam 48 jam pertama

7. pesan_personal: sebut nama bisnis + 1 tantangan spesifik dari jawaban mereka, max 2 kalimat
8. DILARANG: kalimat generik tanpa konteks spesifik

  // ── TUJUAN ─────────────────────────────────────────────────────
  if(step==="tujuan") return e('div',{style:{background:C.cream,minHeight:"100vh"}},
    e('style',null,css),
    e('div',{className:"shell"},
      e(ProgBar,{pct:95,label:"Tujuan",s:4,t:4}),
      e('div',{className:"screen",ref:topRef},
        e('span',{className:"tag",style:{marginBottom:12,display:"inline-flex"}},"🎯 Langkah 4"),
        e('h2',{className:"h2",style:{marginBottom:4}},"Tujuan 30 hari ke depan"),
        e('p',{style:{fontSize:13,color:C.muted,marginBottom:18}},"Jawab dengan ekspektasi nyata — ini yang menentukan arah rencana kamu."),
        e('div',{className:"field"},
          e('p',{className:"lbl"},"30 hari dari sekarang — apa yang berubah?"),
          e('p',{className:"hint"},"Satu hal konkret yang kamu inginkan terjadi untuk brand kamu"),
          e('div',{className:"example"},
            e('p',{style:{fontSize:11,fontWeight:700,color:C.yellow,marginBottom:2}},"✦ Contoh spesifik:"),
            e('p',{style:{fontSize:11,color:C.ink,lineHeight:1.5}},'"Bio IG saya sudah jelas targetnya. Feed konsisten dan orang baru tidak perlu scroll lama untuk paham bisnis saya."')
          ),
          e(QualityTA,{value:f.g1,onChange:ev=>sf("g1",ev.target.value),placeholder:"Apa konkretnya yang ingin berubah?",minChars:60})
        ),
        e('div',{className:"field"},
          e('p',{className:"lbl"},"Prioritas utama saat ini"),
          ...[["🔊 Brand lebih dikenal & mudah diingat","dikenal"],["💰 Lebih banyak yang melihat → membeli","konversi"],["📈 Bangun kepercayaan untuk naik harga","harga"],["🎨 Tampil konsisten di semua platform","konsisten"]].map(([l,v])=>e(Opt,{key:v,label:l,sel:f.g2===v,onSel:()=>sf("g2",v)}))
        ),
        e('div',{className:"field"},
          e('p',{className:"lbl"},"Waktu tersedia per minggu untuk brand"),
          e('p',{className:"hint"},"Realistis saja — di luar operasional sehari-hari"),
          ...[["⏱ 1–2 jam","1-2jam"],["⏱ 3–5 jam","3-5jam"],["⏱ Lebih dari 5 jam","5plus"]].map(([l,v])=>e(Opt,{key:v,label:l,sel:f.g3===v,onSel:()=>sf("g3",v)}))
        ),
        e('div',{className:"field"},
          e('p',{className:"lbl"},"Kendala yang mungkin jadi hambatan"),
          e('p',{className:"hint"},"Budget, skill, tim — agar rencana bisa menyesuaikan kondisi nyata"),
          e('textarea',{className:"ta",placeholder:"contoh: budget maks 500rb/bulan, tidak bisa desain, tidak ada admin",value:f.g4,onChange:ev=>sf("g4",ev.target.value)})
        ),
        err && e('p',{className:"err"},err),
        e('div',{style:{height:90}})
      ),
      e('div',{className:"action-bar"},
        e('button',{className:"btn btn-primary",onClick:()=>{
          if(!f.g1||!f.g2||!f.g3){setErr("Lengkapi semua pertanyaan.");return;}
          if(f.g1.length<30){setErr("Jawaban tujuan masih terlalu singkat.");return;}
          setErr("");runAI(false);
        }},"Buat Brand Growth Plan 30 →"),
        e('button',{className:"btn btn-ghost",style:{marginTop:7},onClick:()=>setStep("tantangan")},"← Kembali")
      )
    )
  );

  // ── ERROR ──────────────────────────────────────────────────────
  if(step==="error") return e('div',{style:{background:C.cream,minHeight:"100vh"}},
    e('style',null,css),
    e('div',{className:"shell",style:{background:C.white}},
      e('div',{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"0 28px",textAlign:"center"}},
        e('div',{style:{width:52,height:52,background:C.yellow,border:"2px solid "+C.ink,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,marginBottom:16}},"⚠️"),
        e('span',{className:"tag",style:{marginBottom:12}},"Ada Kendala"),
        e('h2',{className:"h2",style:{marginBottom:8}},errType==="network"?"Koneksi Bermasalah":errType==="api"?"Server Sibuk":"Hasil Tidak Terbaca"),
        e('p',{style:{fontSize:13,color:C.muted,lineHeight:1.6,marginBottom:6}},err),
        e('p',{style:{fontSize:12,color:C.soft,marginBottom:24}},retryCount<3?"Jawaban kamu tersimpan — tidak perlu isi ulang.":"Sudah 3x mencoba."),
        e('div',{style:{width:"100%",display:"flex",flexDirection:"column",gap:8}},
          retryCount<3
            ? e('button',{className:"btn btn-yellow",style:{boxShadow:"4px 4px 0 "+C.ink},onClick:()=>runAI(true)},"Coba Lagi "+(retryCount>0?"("+retryCount+"/3)":"")+"→")
            : e('a',{href:"https://wa.me/"+WA+"?text=Halo%2C%20saya%20mengalami%20kendala%20di%20Brand%20Growth%20Plan%2030.",target:"_blank",rel:"noreferrer",style:{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:C.green,color:C.white,padding:"14px",borderRadius:14,fontSize:15,fontWeight:700,textDecoration:"none"}},"Hubungi via WhatsApp"),
          e('button',{className:"btn btn-ghost",onClick:()=>setStep("tujuan")},"← Kembali ke Form")
        )
      )
    )
  );

  // ── LOADING ────────────────────────────────────────────────────
  if(step==="loading") return e('div',{style:{background:C.cream,minHeight:"100vh"}},
    e('style',null,css),
    e('div',{className:"shell",style:{background:C.white}},
      e('div',{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"0 24px",textAlign:"center"}},
        e('div',{style:{width:48,height:48,border:"4px solid "+C.cream,borderTop:"4px solid "+C.yellow,borderRadius:"50%",animation:"spin 0.85s linear infinite",marginBottom:24}}),
        e('span',{className:"tag",style:{marginBottom:14}},"Sedang diproses"),
        e('p',{style:{fontSize:15,fontWeight:700,color:C.ink,marginBottom:6}},LOAD_MSGS[loadIdx]),
        e('p',{style:{fontSize:13,color:C.muted}},"Untuk ",e('strong',null,f.namaBisnis),"...")
      )
    )
  );

  // ── RESULT ─────────────────────────────────────────────────────
  if(step==="result"&&result) {
    const loc = f.wilayahDetail||f.wilayah||"Indonesia";
    return e('div',{style:{background:C.cream,minHeight:"100vh"}},
      e('style',null,css),
      e('div',{className:"shell"},
        e('div',{style:{background:C.ink,padding:"24px 20px 20px",position:"relative",overflow:"hidden"}},
          e('div',{style:{position:"absolute",top:-30,right:-30,width:90,height:90,borderRadius:"50%",background:C.yellow,opacity:0.1}}),
          e('span',{className:"tag",style:{marginBottom:10,display:"inline-flex"}},"Brand Growth Plan 30"),
          e('h2',{style:{fontSize:20,fontWeight:800,color:C.white,marginBottom:2}},f.namaBisnis),
          e('p',{style:{fontSize:11,color:"rgba(255,255,255,0.4)"}},f.industri+" · "+loc+" · "+new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"}))
        ),
        e('div',{className:"screen",style:{paddingTop:20},ref:topRef},
          result.opening_line && e('div',{style:{borderLeft:"3px solid "+C.yellow,paddingLeft:14,marginBottom:16}},
            e('p',{style:{fontSize:14,fontFamily:"'Playfair Display',serif",fontStyle:"italic",lineHeight:1.65}},result.opening_line)
          ),
          e('div',{style:{background:C.cream,border:"2px solid "+C.border,borderRadius:12,padding:"14px 16px",marginBottom:12}},
            e('p',{className:"eyebrow",style:{marginBottom:10}},"📊 Diagnosis"),
            e('p',{style:{fontSize:13,lineHeight:1.75,marginBottom:8}},result.diagnosis_p1),
            e('div',{style:{height:1,background:C.border,marginBottom:8}}),
            e('p',{style:{fontSize:13,lineHeight:1.75}},result.diagnosis_p2)
          ),
          e('div',{style:{background:C.yellow,border:"2px solid "+C.ink,borderRadius:12,padding:"14px 16px",marginBottom:12}},
            e('p',{className:"eyebrow",style:{marginBottom:10}},"⚡ Prioritas 48 Jam Pertama"),
            ...(result.prioritas||[]).map((p,i)=>
              e('div',{key:i,style:{display:"flex",gap:8,alignItems:"flex-start",marginBottom:i<(result.prioritas.length-1)?8:0}},
                e('span',{style:{fontWeight:800,fontSize:13,flexShrink:0,minWidth:18}},i+1+"."),
                e('p',{style:{fontSize:13,fontWeight:500,lineHeight:1.5}},p)
              )
            )
          ),
          result.kompetitor_analisis&&result.kompetitor_analisis.length>0 && e('div',{style:{marginBottom:12}},
            e('div',{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10}},
              e('p',{className:"eyebrow"},"🔎 Kompetitor"),
              result.kompetitor_riset_mandiri && e('span',{style:{background:C.yellowLight,border:"1px solid "+C.yellow,color:C.ink,fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99}},"RISET AI")
            ),
            ...result.kompetitor_analisis.map((k,i)=>
              e('div',{key:i,className:"komp-card",style:{marginBottom:10}},
                e('div',{className:"komp-head"},
                  e('p',{style:{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.4)",letterSpacing:"0.08em",marginBottom:2}},"KOMPETITOR "+(i+1)),
                  e('p',{style:{fontSize:14,fontWeight:800,color:C.white}},k.nama||k.url),
                  k.nama&&k.url&&e('p',{style:{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:1}},k.url)
                ),
                e('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:C.white}},
                  ...[["✦ Kelebihan",k.kelebihan,C.soft],["↓ Kelemahan",k.kelemahan,C.soft],["→ Peluang",k.peluang,C.ink]].map(([lbl,val,col])=>
                    e('div',{key:lbl,style:{padding:"10px 11px",borderRight:"1px solid "+C.border}},
                      e('p',{style:{fontSize:9,fontWeight:800,color:C.soft,letterSpacing:"0.08em",marginBottom:4}},lbl.toUpperCase()),
                      e('p',{style:{fontSize:12,lineHeight:1.5,color:col,fontWeight:lbl.includes("Peluang")?"600":"400"}},val)
                    )
                  )
                )
              )
            )
          ),
          e('p',{className:"eyebrow",style:{marginBottom:10}},"📅 Rencana 30 Hari"),
          ...["minggu1","minggu2","minggu3","minggu4"].map((m,i)=>result[m]?e(WkCard,{key:m,n:i+1,data:result[m]}):null),
          e('div',{style:{background:C.cream,border:"2px solid "+C.border,borderRadius:12,padding:"14px 16px",marginTop:4,marginBottom:14}},
            e('p',{className:"eyebrow",style:{marginBottom:8}},"💬 Pesan dari Saya"),
            e('p',{style:{fontSize:13,lineHeight:1.7,fontStyle:"italic",marginBottom:12}},result.pesan_personal),
            e('div',{style:{display:"flex",alignItems:"center",gap:10}},
              e('div',{style:{width:32,height:32,background:C.yellow,border:"2px solid "+C.ink,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800}},"B"),
              e('div',null,
                e('p',{style:{fontSize:12,fontWeight:700}},"Budi Pranoto"),
                e('p',{style:{fontSize:11,color:C.muted}},"Digital & Brand Strategist")
              )
            )
          ),
          e('a',{href:"https://wa.me/"+WA+"?text=Halo%2C%20saya%20baru%20selesai%20Brand%20Growth%20Plan%2030%20untuk%20"+encodeURIComponent(f.namaBisnis)+"%20dan%20ingin%20konsultasi.",target:"_blank",rel:"noreferrer",style:{display:"flex",alignItems:"center",gap:12,background:C.ink,borderRadius:12,padding:"14px 16px",marginBottom:16,textDecoration:"none",boxShadow:"4px 4px 0 "+C.yellow}},
            e('svg',{width:32,height:32,viewBox:"0 0 36 36",fill:"none"},
              e('rect',{width:36,height:36,rx:8,fill:"#25D366"}),
              e('path',{d:"M18 7C12.477 7 8 11.477 8 17c0 1.89.52 3.66 1.427 5.18L8 29l6.98-1.407A10 10 0 0 0 18 28c5.523 0 10-4.477 10-10S23.523 7 18 7Z",fill:"white"}),
              e('path',{d:"M14.5 13.5c-.3-.7-.6-.7-.9-.7h-.8c-.3 0-.7.1-1 .5-.4.4-1.4 1.3-1.4 3.2s1.4 3.7 1.6 4c.2.2 2.8 4.4 6.9 6 .9.4 1.7.6 2.2.7.9.2 1.8.2 2.4.1.7-.1 2.2-.9 2.5-1.8.3-.8.3-1.6.2-1.7-.1-.2-.4-.3-.8-.5-.5-.2-2.8-1.4-3.2-1.5-.4-.2-.7-.2-1 .2-.3.4-1.1 1.5-1.4 1.8-.2.3-.5.3-.9.1-.5-.2-2-.7-3.8-2.4-1.4-1.3-2.4-2.9-2.6-3.3-.3-.4 0-.7.2-.9.2-.2.5-.5.7-.8.2-.3.3-.5.4-.9.2-.3.1-.6 0-.9Z",fill:"#25D366"})
            ),
            e('div',null,
              e('p',{style:{fontSize:13,fontWeight:700,color:C.white,marginBottom:1}},"Butuh pendampingan lebih dalam?"),
              e('p',{style:{fontSize:12,color:"rgba(255,255,255,0.5)"}},"Klik untuk konsultasi dengan Budi")
            )
          ),
          e(CreditLine,null),
          e('div',{style:{height:90}})
        ),
        e('div',{className:"action-bar"},
          e('button',{className:"btn btn-yellow",onClick:doPDF,disabled:pdfLoading},pdfLoading?"Membuka PDF...":"⬇ Download PDF")
        )
      )
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
